<!DOCTYPE html>
<html>
<head>
  <title>VJDQ Farewell 2K26</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0b2a30;
      background-image: linear-gradient(rgba(45,212,191,0.05) 1px,transparent 1px),
                        linear-gradient(90deg,rgba(45,212,191,0.05) 1px,transparent 1px);
      background-size: 40px 40px;
      font-family: 'Inter', sans-serif;
      color: #f0fdfc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900;
      font-size: clamp(32px, 6vw, 64px);
      color: #2dd4bf;
      text-shadow: 0 0 40px rgba(45,212,191,0.5);
      text-align: center;
      margin-bottom: 12px;
    }
    p.sub {
      color: #7fb3ae;
      letter-spacing: 6px;
      font-size: 13px;
      margin-bottom: 60px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 900px;
      width: 100%;
    }
    a.card {
      background: #0f3540;
      border: 1px solid rgba(45,212,191,0.15);
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      text-decoration: none;
      color: #f0fdfc;
      transition: all 0.3s;
    }
    a.card:hover {
      border-color: rgba(45,212,191,0.5);
      transform: translateY(-4px);
      box-shadow: 0 0 28px rgba(45,212,191,0.1);
    }
    a.card img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(45,212,191,0.4);
      margin-bottom: 14px;
    }
    a.card .name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #2dd4bf;
      margin-bottom: 4px;
    }
    a.card .role {
      font-size: 11px;
      color: #7fb3ae;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <h1>FAREWELL 2K26</h1>
  <p class="sub">VJ DATA QUESTERS · VNRVJIET</p>
  <div class="grid">
    <a href="avinash/" class="card">
      <img src="assets/photos/avinash-portrait.jpg" alt="Avinash">
      <div class="name">AVINASH</div>
      <div class="role">President</div>
    </a>
    <a href="sneha/" class="card">
      <img src="assets/photos/sneha-portrait.jpg" alt="Sneha">
      <div class="name">SNEHA</div>
      <div class="role">Vice President</div>
    </a>
    <!-- add more cards here -->
  </div>
</body>
</html>
